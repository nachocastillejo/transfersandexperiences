<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Chat Viewer - SQLite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --chat-bg: #efeae2;
            --primary: #00a884;
            --text-dark: #111b21;
            --text-light: #667781;
            --msg-in: #ffffff;
            --msg-out: #d9fdd3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #d1d7db;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 95%;
            max-width: 1400px;
            height: 90vh;
            background: var(--bg-color);
            display: flex;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border-radius: 12px;
        }

        .sidebar {
            width: 350px;
            background: #fff;
            border-right: 1px solid #d1d7db;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #f0f2f5;
            padding: 15px 20px;
            font-weight: 600;
            color: var(--text-dark);
            border-bottom: 1px solid #d1d7db;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .refresh-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        .refresh-btn:hover {
            background: #008f6f;
        }

        .contact-list {
            overflow-y: auto;
            flex: 1;
        }

        .contact-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f2f2f2;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }

        .contact-item:hover {
            background: #f5f6f6;
        }

        .contact-item.active {
            background: #f0f2f5;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: #dfe5e7;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            margin-right: 15px;
            color: #fff;
        }

        .chat-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-repeat: repeat;
            opacity: 0.95;
        }

        .chat-header {
            background: #f0f2f5;
            padding: 15px;
            height: 60px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #d1d7db;
        }

        .chat-title {
            font-weight: 600;
            color: var(--text-dark);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px 5%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            position: relative;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
            line-height: 1.4;
            display: flex;
            flex-direction: column;
        }

        .msg-in {
            align-self: flex-start;
            background: var(--msg-in);
            border-top-left-radius: 0;
        }

        .msg-out {
            align-self: flex-end;
            background: var(--msg-out);
            border-top-right-radius: 0;
        }

        .msg-sender {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .msg-in .msg-sender {
            color: #d9241b;
        }

        .msg-out .msg-sender {
            color: #029d00;
        }

        .msg-text {
            color: var(--text-dark);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .msg-meta {
            font-size: 11px;
            color: var(--text-light);
            text-align: right;
            margin-top: 5px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            align-items: center;
        }

        .response-time {
            background: #e0f2fe;
            color: #0284c7;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 10px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: var(--text-light);
            background: #f0f2f5;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="header">
                Chats Activos
                <button class="refresh-btn" onclick="fetchData()">🔄 Actualizar</button>
            </div>
            <div class="contact-list" id="contactList"></div>
        </div>
        <div class="chat-pane" id="chatPane" style="display: none;">
            <div class="chat-header">
                <div class="avatar">👤</div>
                <div class="chat-title" id="currentChatTitle">Selecciona un chat</div>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
        </div>
        <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" width="80" height="80" stroke="#8696a0" stroke-width="1.5" fill="none">
                <path
                    d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                </path>
            </svg>
            <h2 style="margin-top: 20px; font-weight: 400;">Transfers & Experiences Live</h2>
            <p style="margin-top: 10px; font-size: 14px;">Monitorización de conversaciones en tiempo real.</p>
        </div>
    </div>

    <script>
        let groupedChats = {};
        let currentPhone = null;

        function escapeHtml(unsafe) {
            return (unsafe || "").toString()
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function renderContactList() {
            const list = document.getElementById('contactList');
            list.innerHTML = '';

            const phones = Object.keys(groupedChats).sort((a, b) => {
                const msgA = groupedChats[a][groupedChats[a].length - 1].timestamp;
                const msgB = groupedChats[b][groupedChats[b].length - 1].timestamp;
                return msgB.localeCompare(msgA);
            });

            if (phones.length === 0) {
                list.innerHTML = '<div style="padding: 20px; color: var(--text-light); text-align: center;">No hay mensajes registrados.</div>';
                return;
            }

            phones.forEach(phone => {
                const msgs = groupedChats[phone];
                const lastMsg = msgs[msgs.length - 1];
                let displayPhone = lastMsg.sender && !["Usuario", "Bot", "🤖 BOT"].includes(lastMsg.sender) ? lastMsg.sender : phone;

                const div = document.createElement('div');
                div.className = `contact-item ${phone === currentPhone ? 'active' : ''}`;
                div.onclick = () => selectChat(phone);
                div.innerHTML = `
                    <div class="avatar">👤</div>
                    <div style="flex: 1; min-width: 0;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 3px;">
                            <strong style="text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">${escapeHtml(displayPhone)}</strong>
                            <small style="color: var(--text-light); font-size: 11px;">${lastMsg.timestamp.split(' ')[1] || ""}</small>
                        </div>
                        <div style="color: var(--text-light); font-size: 12px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">
                            ${escapeHtml(lastMsg.message)}
                        </div>
                    </div>`;
                list.appendChild(div);
            });
        }

        function selectChat(phone) {
            currentPhone = phone;
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('chatPane').style.display = 'flex';
            const msgs = groupedChats[phone] || [];
            let displayTitle = phone;

            // Try to find a real name
            for (let i = msgs.length - 1; i >= 0; i--) {
                if (msgs[i].direction === 'inbound' && msgs[i].sender && !["Usuario"].includes(msgs[i].sender)) {
                    displayTitle = msgs[i].sender + " (" + phone + ")";
                    break;
                }
            }

            document.getElementById('currentChatTitle').textContent = displayTitle;
            renderContactList();

            const container = document.getElementById('messagesContainer');
            if (container.dataset.phone === phone && parseInt(container.dataset.msgCount) === msgs.length) return;

            container.innerHTML = '';
            container.dataset.phone = phone;
            container.dataset.msgCount = msgs.length;

            msgs.forEach(msg => {
                const isOutbound = msg.direction.startsWith('outbound');
                const div = document.createElement('div');
                div.className = `message ${isOutbound ? 'msg-out' : 'msg-in'}`;

                const rt = msg.responseTime ? parseFloat(msg.responseTime) : null;
                const rtBadge = rt ? `<span class="response-time">⏱️ ${rt.toFixed(2)}s</span>` : '';

                div.innerHTML = `
                    <div class="msg-sender">${escapeHtml(msg.sender || (isOutbound ? "Bot" : "Usuario"))}</div>
                    <div class="msg-text">${escapeHtml(msg.message).replace(/\n/g, '<br>')}</div>
                    <div class="msg-meta">
                        ${rtBadge}
                        <span>${(msg.timestamp.split(' ')[1] || "").substring(0, 5)}</span>
                    </div>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function fetchData() {
            fetch('/api/demo_logs')
                .then(r => r.json())
                .then(data => {
                    groupedChats = {};
                    data.forEach(m => {
                        const p = m.phone || "Desconocido";
                        if (!groupedChats[p]) groupedChats[p] = [];
                        groupedChats[p].push(m);
                    });
                    renderContactList();
                    if (currentPhone && groupedChats[currentPhone]) selectChat(currentPhone);
                })
                .catch(err => console.error("Error fetching logs:", err));
        }

        setInterval(fetchData, 4000);
        window.onload = fetchData;
    </script>
</body>

</html>
